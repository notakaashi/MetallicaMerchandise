<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View your Metallica Merch Store order details.">
  <title>Order Details — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<!-- Navbar injected by auth.js -->

<div class="page-wrapper section-padding">
  <div class="container" style="max-width:860px">
    <div class="page-header">
      <div>
        <h1 class="page-header-title">Order Details</h1>
        <p class="text-muted mt-1">View details for your specific order</p>
      </div>
      <a href="/orders.html" class="btn btn-secondary">Back to Orders</a>
    </div>

    <div id="order-container">
      <div class="text-center section-padding">
        <div class="spinner"></div>
        <p class="text-muted mt-2">Loading order details...</p>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/order.js"></script>
<script>
  $(document).ready(function () {
    const id = new URLSearchParams(window.location.search).get('id');
    // Auth guard
    if (!window.Auth.requireAuth('/login?redirect=/order?id=' + id)) return;
    window.renderNavbar({ showCart: true, showSearch: false });
  });
</script>
</body>
</html>
