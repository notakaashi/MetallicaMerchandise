<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop official Metallica merchandise — tour tees, hoodies, vinyl, accessories and more.">
  <title>Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
</head>
<body>

<!-- Navbar injected by auth.js -->

<div class="page-wrapper">
  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="lightning-effect"></div>
    <div class="hero-content">
      <img src="http://localhost:3001/uploads/Metallica_logo.png" alt="Metallica" class="hero-logo-img">
      <p class="hero-subtitle">
        The Heaviest Merch in Metal
      </p>
      <div class="hero-actions">
        <a href="#catalog" class="btn btn-primary btn-lg">Shop Now</a>
        <a href="/products.html" class="btn btn-secondary btn-lg">Browse All</a>
      </div>
    </div>
    <div class="scroll-indicator">
      <span>Scroll</span>
      <div class="scroll-indicator-line"></div>
    </div>
  </section>

  <!-- CATALOG -->
  <section class="section-padding" id="catalog">
    <div class="container">
      <div class="text-center mb-4">
        <h2>Merch Catalog</h2>
        <div style="width: 60px; height: 1px; background-color: var(--color-silver-dark); margin: 0 auto;"></div>
      </div>

      <!-- Product Grid -->
      <div class="grid grid-cols-4" id="product-grid">
        <div style="grid-column:1/-1;text-align:center;padding:var(--space-4xl) 0">
          <div class="spinner"></div>
          <p class="text-muted mt-2">Loading merch...</p>
        </div>
      </div>

      <!-- Pagination -->
      <div id="pagination"></div>
    </div>
  </section>
</div>

<!-- Product Detail Modal -->
<div class="modal-overlay" id="product-modal-overlay">
  <div class="modal" id="product-modal" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="product-modal-title">Product Details</h2>
      <button class="modal-close" id="product-modal-close" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="product-modal-body">
      <div style="text-align:center;padding:60px"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="/js/auth.js?v=7"></script>
<script src="/js/cart.js?v=7"></script>
<script>
  $(document).ready(function () {
    window.renderNavbar({ showCart: true, showSearch: true });
  });
</script>
</body>
</html>
