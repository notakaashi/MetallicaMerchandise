<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=9">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
</head>
<body>

  <div class="page-wrapper section-padding">
    <div class="container">
      <div id="product-loading" class="text-center text-muted" style="padding:var(--space-4xl) 0;">
        <div class="spinner"></div>
        <p class="mt-2">Loading product details...</p>
      </div>
    
      <div id="product-content" style="display:none">
        <div class="grid grid-cols-2" style="align-items:start;margin-bottom:var(--space-4xl)">
          <div class="product-gallery">
            <div class="main-image-wrapper">
              <img id="main-product-image" src="" alt="Main Product Image">
            </div>
            <div class="thumbnail-strip" id="detail-gallery">
              <!-- Thumbnails go here -->
            </div>
          </div>
          <div>
            <h1 id="detail-name" class="product-title" style="margin-bottom:var(--space-sm)"></h1>
            <div id="detail-price" style="font-size:36px;color:var(--color-white);font-weight:300;font-family:var(--font-body);margin-bottom:var(--space-md)"></div>
            <div id="detail-stock-badge" style="margin-bottom:var(--space-lg)"></div>
            <p id="detail-desc" style="color:var(--text-secondary);line-height:1.7;margin-bottom:var(--space-xl)"></p>
            
            <div class="qty-selector" style="margin-bottom:var(--space-2xl); display:flex; align-items:center; gap:var(--space-md);">
              <label class="form-label" style="margin:0; font-family:var(--font-display); font-size:14px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-secondary);">Quantity</label>
              <div class="product-qty-control">
                <button class="product-qty-btn" onclick="let v = parseInt($('#detail-qty').val()); if(v>1) $('#detail-qty').val(v-1);">−</button>
                <input type="number" id="detail-qty" class="product-qty-value" value="1" min="1">
                <button class="product-qty-btn" onclick="$('#detail-qty').val(parseInt($('#detail-qty').val())+1)">+</button>
              </div>
            </div>
            
            <div class="grid grid-cols-2" style="gap:var(--space-md)">
              <button class="btn btn-primary w-full" id="detail-add-btn">Add to Cart</button>
              <a href="/checkout.html" class="btn btn-outline w-full text-center">Checkout →</a>
            </div>
          </div>
        </div>

        <div style="border-top: 1px solid var(--border-color); padding-top: var(--space-3xl);">
          <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:var(--space-xl);">
            <div>
              <h2>Reviews</h2>
              <p id="reviews-stats" class="text-muted">Loading reviews...</p>
            </div>
          </div>
          
          <div id="review-msg" class="empty-state" style="margin-bottom:var(--space-xl)">Loading eligibility...</div>
          
          <div id="review-form-container" class="auth-card" style="margin-bottom:var(--space-xl); display:none;">
            <h3 style="margin-bottom:var(--space-md)">Write a Review</h3>
            <form id="review-form" novalidate>
              <div class="form-group">
                <label class="form-label" for="review-rating">Rating (1-5)</label>
                <select id="review-rating" name="rating" class="form-control" required>
                  <option value="">Select a rating</option>
                  <option value="5">5 - Excellent</option>
                  <option value="4">4 - Good</option>
                  <option value="3">3 - Average</option>
                  <option value="2">2 - Poor</option>
                  <option value="1">1 - Terrible</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="review-comment">Comment</label>
                <textarea id="review-comment" name="comment" class="form-control" rows="4" placeholder="Share your thoughts about this product..." required></textarea>
              </div>
              <button type="submit" id="submit-review-btn" class="btn btn-primary">Submit Review</button>
            </form>
          </div>
          
          <div id="reviews-list">
            <!-- Reviews go here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/product.js?v=8"></script>
  <script>
    $(document).ready(function () {
      window.renderNavbar({ showCart: true, showSearch: true });
    });
  </script>
</body>
</html>
