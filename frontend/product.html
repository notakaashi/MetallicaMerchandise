<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <style>
    .product-page-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .product-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 60px;
    }
    @media (max-width: 768px) {
      .product-details { grid-template-columns: 1fr; }
    }
    .product-images-grid img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .qty-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .qty-input {
      width: 50px;
      height: 32px;
      background: #121212;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      text-align: center;
      border-radius: 4px;
    }
    .stock-badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      display: inline-block;
    }
    .stock-badge.in-stock { background: rgba(40, 199, 111, 0.15); color: #28c76f; }
    .stock-badge.out-stock { background: rgba(234, 84, 85, 0.15); color: #ea5455; }
    
    .reviews-section {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 40px;
    }
    .reviews-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
    }
    .reviews-summary {
      font-family: 'Outfit', sans-serif;
    }
    .reviews-summary h2 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .reviews-summary p {
      color: var(--text-secondary);
    }
    .review-item {
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .reviewer-name {
      font-weight: 600;
      color: var(--text-primary);
    }
    .review-date {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .review-stars {
      color: #ffc107;
      margin-bottom: 12px;
      font-size: 18px;
    }
    .review-comment {
      color: #d1d1d1;
      line-height: 1.5;
    }
    
    .review-form-container {
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 24px;
      border-radius: var(--radius-md);
      margin-bottom: 40px;
      display: none;
    }
    .review-msg {
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: var(--radius-md);
      margin-bottom: 40px;
      text-align: center;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="page-wrapper" style="padding-top:calc(var(--navbar-height) + 40px)">
    <div class="product-page-container">
      <div id="product-loading" style="text-align:center;padding:60px;color:var(--text-secondary)">Loading product details...</div>
    
    <div id="product-content" style="display:none">
      <div class="product-details">
        <div class="product-images-grid" id="detail-gallery">
          <!-- Images go here -->
        </div>
        <div class="product-info">
          <h1 id="detail-name" style="font-size:32px;font-weight:900;font-family:'Outfit',sans-serif;margin-bottom:12px"></h1>
          <div id="detail-price" style="font-size:28px;color:var(--accent-red);font-weight:900;font-family:'Outfit',sans-serif;margin-bottom:16px"></div>
          <div id="detail-stock-badge" style="margin-bottom:24px"></div>
          <p id="detail-desc" style="color:var(--text-secondary);line-height:1.6;margin-bottom:32px"></p>
          
          <div class="qty-selector">
            <span style="color:var(--text-primary);font-weight:500">Quantity:</span>
            <button class="qty-btn" onclick="let v = parseInt($('#detail-qty').val()); if(v>1) $('#detail-qty').val(v-1);">-</button>
            <input type="number" id="detail-qty" class="qty-input" value="1" min="1">
            <button class="qty-btn" onclick="$('#detail-qty').val(parseInt($('#detail-qty').val())+1)">+</button>
          </div>
          
          <button class="btn btn-primary btn-lg w-full" id="detail-add-btn">Add to Cart</button>
        </div>
      </div>

      <div class="reviews-section">
        <div class="reviews-header">
          <div class="reviews-summary">
            <h2>Reviews</h2>
            <p id="reviews-stats">Loading reviews...</p>
          </div>
        </div>
        
        <div id="review-msg" class="review-msg">Loading eligibility...</div>
        
        <div id="review-form-container" class="review-form-container">
          <h3 style="margin-bottom:16px">Write a Review</h3>
          <form id="review-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="review-rating">Rating (1-5)</label>
              <select id="review-rating" name="rating" class="form-control" required style="background:#121212;color:#fff">
                <option value="">Select a rating</option>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Good</option>
                <option value="3">3 - Average</option>
                <option value="2">2 - Poor</option>
                <option value="1">1 - Terrible</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="review-comment">Comment</label>
              <textarea id="review-comment" name="comment" class="form-control" rows="4" placeholder="Share your thoughts about this product..." required></textarea>
            </div>
            <button type="submit" id="submit-review-btn" class="btn btn-primary">Submit Review</button>
          </form>
        </div>
        
        <div id="reviews-list">
          <!-- Reviews go here -->
        </div>
      </div>
    </div>
  </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/product.js?v=7"></script>
  <script>
    $(document).ready(function () {
      window.renderNavbar({ showCart: true, showSearch: true });
    });
  </script>
</body>
</html>
