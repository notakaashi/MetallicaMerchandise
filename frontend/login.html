<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Metallica Merch Store account.">
  <title>Login — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">⚡ METALLICA</div>
    <div class="auth-tagline">Merch Store — Member Login</div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" id="login-email" name="email" class="form-control" placeholder="your@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input type="password" id="login-password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary w-full btn-lg" style="margin-top:8px">
        🤘 Login
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:14px;color:var(--text-secondary)">
      Don't have an account?
      <a href="/register.html" style="color:var(--accent-red);font-weight:600">Join the pit →</a>
    </p>

    <div style="margin-top:24px;padding:16px;background:var(--bg-secondary);border-radius:var(--radius-md);border:1px solid var(--border-color)">
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">Demo Accounts</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.8">
        <strong style="color:var(--accent-red)">Admin:</strong> admin@metallica.store / admin123<br>
        <strong style="color:var(--info)">Customer:</strong> customer@metallica.store / customer123
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/js/auth.js"></script>
<script>
  $(document).ready(function () {
    // Redirect if already logged in
    if (window.Auth.isLoggedIn()) {
      window.location.href = window.Auth.isAdmin() ? '/admin/dashboard.html' : '/index.html';
      return;
    }

    $('#login-form').validate({
      rules: {
        email:    { required: true, email: true },
        password: { required: true, minlength: 6 },
      },
      messages: {
        email:    { required: 'Email is required', email: 'Enter a valid email' },
        password: { required: 'Password is required', minlength: 'At least 6 characters' },
      },
      submitHandler: function () {
        const $btn = $('#login-btn');
        $btn.prop('disabled', true).html('<span class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></span>');

        $.ajax({
          url: `${API_BASE}/api/auth/login`,
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ email: $('#login-email').val().trim(), password: $('#login-password').val() }),
          success: function (data) {
            window.Auth.setSession(data.token, data.user);
            window.showToast('Welcome back, ' + data.user.name + '! 🤘', 'success');
            const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
            setTimeout(() => { window.location.href = data.user.role === 'admin' ? '/admin/dashboard.html' : redirect; }, 800);
          },
          error: function (xhr) {
            const msg = xhr.responseJSON ? xhr.responseJSON.error : 'Login failed';
            window.showToast(msg, 'error');
            $btn.prop('disabled', false).html('🤘 Login');
          },
        });
      },
    });
  });
</script>
</body>
</html>
