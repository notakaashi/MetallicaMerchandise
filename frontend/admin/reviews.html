<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage Metallica Merch Store reviews.">
  <title>Reviews — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="/css/main.css?v=2">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>
<body data-page="reviews">

<div class="admin-layout">
  <main class="admin-main">
    <div class="page-header">
      <div>
        <h1 class="page-header-title">Review Management</h1>
        <p class="text-muted mt-1">Manage user product reviews</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="datatable-wrap">
          <table id="reviews-table" class="dataTable" style="width:100%">
            <thead>
              <tr>
                <th>#</th>
                <th>User</th>
                <th>Product</th>
                <th>Rating</th>
                <th>Comment</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>


<script src="/js/auth.js"></script>
<script src="/js/admin.js?v=2"></script>
<script>
  $(document).ready(function () {
    window.renderNavbar({ showCart: false, showSearch: false });
  });
</script>
</body>
</html>
