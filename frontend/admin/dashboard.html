<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Metallica Merch Store admin dashboard with sales charts and KPIs.">
  <title>Dashboard — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body data-page="dashboard">

<!-- Navbar and Sidebar injected by auth.js -->

<div class="admin-layout">
  <main class="admin-main">
    <div class="page-header">
      <div>
        <h1 class="page-header-title">Dashboard</h1>
        <p class="page-header-subtitle">Sales metrics and store analytics</p>
      </div>
      <div style="font-size:13px;color:var(--text-muted)">
        Last updated: <span id="last-updated">—</span>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total Revenue</div>
        <div class="kpi-value" id="kpi-revenue">₱0.00</div>
        <div class="kpi-icon">$</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total Orders</div>
        <div class="kpi-value" id="kpi-orders">0</div>
        <div class="kpi-icon">#</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Products Listed</div>
        <div class="kpi-value" id="kpi-products">0</div>
        <div class="kpi-icon">#</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="chart-grid">
      <div class="chart-card" style="grid-column:1/-1">
        <div class="chart-title">Sales per Product (Units Sold)</div>
        <canvas id="bar-chart" height="90"></canvas>
      </div>
    </div>

    <div class="chart-grid" style="margin-top:24px">
      <div class="chart-card">
        <div class="chart-title">Daily Revenue (Last 30 Days)</div>
        <canvas id="line-chart" height="160"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Order Status Distribution</div>
        <canvas id="pie-chart" height="160"></canvas>
      </div>
    </div>
  </main>
</div>

<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>
  $(document).ready(function () {
    // Auth guard is handled by admin.js
    window.renderNavbar({ showCart: false, showSearch: false });
    $('#last-updated').text(new Date().toLocaleTimeString());
  });
</script>
</body>
</html>
