<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage Metallica Merch Store users — roles and status.">
  <title>Users — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="/css/main.css?v=2">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>
<body data-page="users">

<div class="admin-layout">
  <main class="admin-main">
    <div class="page-header">
      <div>
        <h1 class="page-header-title">User Management</h1>
        <p class="text-muted mt-1">Manage roles and account status for all users</p>
      </div>
      <button class="btn btn-accent" id="add-user-btn">Add User</button>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="datatable-wrap">
          <table id="users-table" class="dataTable" style="width:100%">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- User Modal -->
<div class="modal-overlay" id="user-form-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="user-modal-title">Add User</h2>
      <button type="button" class="modal-close" id="user-form-modal-close">&times;</button>
    </div>
    <form id="user-form">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="edit-user-name">Name</label>
          <input type="text" id="edit-user-name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-user-email">Email</label>
          <input type="email" id="edit-user-email" name="email" class="form-control" required>
        </div>
        <div class="form-group" id="edit-user-password-group">
          <label class="form-label" for="edit-user-password">Password</label>
          <input type="password" id="edit-user-password" name="password" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-user-role">Role</label>
          <select id="edit-user-role" name="role" class="form-control" required>
            <option value="customer" id="role-option-customer">Customer</option>
            <option value="admin" id="role-option-admin">Admin</option>
          </select>
        </div>
        <div class="form-group" id="edit-user-status-group">
          <label class="form-label" for="edit-user-status">Status</label>
          <select id="edit-user-status" name="status" class="form-control">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="modal-footer" style="padding:20px 28px 24px;display:flex;justify-content:flex-end;gap:var(--space-md)">
        <button type="button" class="btn btn-secondary" onclick="$('#user-form-modal').removeClass('open')">Cancel</button>
        <button type="submit" class="btn btn-accent">Save User</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>
  $(document).ready(function () {
    window.renderNavbar({ showCart: false, showSearch: false });
  });
</script>
</body>
</html>
