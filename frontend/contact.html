<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Metallica Merchandise Store">
  <title>Contact Us - Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
</head>
<body>

<!-- Navbar injected by auth.js -->

<div class="page-wrapper section-padding">
  <div class="container text-center" style="max-width: 800px;">
    <h1 style="font-family:var(--font-display);font-weight:900;font-size:48px;margin-bottom:var(--space-md)">Contact <span class="text-accent">Us</span></h1>
    <p class="text-muted" style="font-size:18px;margin-bottom:var(--space-4xl);">
      Have a question about an order or our merch? Drop us a line.
    </p>
    
    <div class="auth-card text-left" style="margin-bottom:var(--space-2xl);">
      <p style="margin-bottom: var(--space-sm);"><strong style="color: var(--color-white); font-weight: 600;">General Inquiries:</strong> store@metallica.com</p>
      <p style="margin-bottom: var(--space-sm);"><strong style="color: var(--color-white); font-weight: 600;">Customer Support:</strong> support@metallica.com</p>
      <p style="margin-bottom: var(--space-sm);"><strong style="color: var(--color-white); font-weight: 600;">Phone:</strong> +1 (800) METALLICA (638-2554)</p>
      <p style="margin-bottom: 0;"><strong style="color: var(--color-white); font-weight: 600;">Headquarters:</strong> HQ, San Rafael, CA, United States</p>
    </div>

    <form id="contact-form" class="auth-card text-left">
      <div class="form-group">
        <label class="form-label" for="name">Your Name</label>
        <input type="text" id="name" name="name" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="message">Message</label>
        <textarea id="message" name="message" rows="5" class="form-control" required></textarea>
      </div>

      <button type="submit" class="btn btn-accent w-full btn-lg mt-2">Send Message</button>
    </form>
  </div>
</div>

<script src="/js/auth.js?v=2"></script>
<script src="/js/cart.js?v=2"></script>
<script>
  $(document).ready(function () {
    window.renderNavbar({ showCart: true, showSearch: true });

    $('#contact-form').on('submit', function(e) {
      e.preventDefault();
      const btn = $(this).find('button[type="submit"]');
      const originalText = btn.text();
      btn.text('Sending...').prop('disabled', true);
      
      // Simulate sending
      setTimeout(() => {
        window.showToast('Your message has been sent. We will get back to you shortly!', 'success');
        $('#contact-form')[0].reset();
        btn.text(originalText).prop('disabled', false);
      }, 1000);
    });
  });
</script>
</body>
</html>
