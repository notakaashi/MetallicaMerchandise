<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Metallica Merchandise Store">
  <title>Contact Us - Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
</head>
<body>

<!-- Navbar injected by auth.js -->

<div class="page-wrapper">
  <section class="hero" style="padding-top: 120px; padding-bottom: 60px;">
    <div class="container" style="text-align: center;">
      <h1 class="hero-title" style="font-size: 48px;">
        Contact <span>Us</span>
      </h1>
      <p class="hero-subtitle" style="max-width: 800px; margin: 0 auto;">
        Have a question about an order or our merch? Drop us a line.
      </p>
    </div>
  </section>

  <section class="catalog-section">
    <div class="container" style="max-width: 600px; padding: 40px 20px;">
      
      <div style="text-align: center; margin-bottom: 40px; color: var(--text-muted); font-size: 16px; line-height: 1.6;">
        <p style="margin-bottom: 8px;"><strong style="color: #fff; font-weight: 600;">General Inquiries:</strong> store@metallica.com</p>
        <p style="margin-bottom: 8px;"><strong style="color: #fff; font-weight: 600;">Customer Support:</strong> support@metallica.com</p>
        <p style="margin-bottom: 8px;"><strong style="color: #fff; font-weight: 600;">Phone:</strong> +1 (800) METALLICA (638-2554)</p>
        <p style="margin-bottom: 0;"><strong style="color: #fff; font-weight: 600;">Headquarters:</strong> HQ, San Rafael, CA, United States</p>
      </div>

      <form id="contact-form" style="background: var(--bg-card); padding: 40px; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.05);">
        
        <div style="margin-bottom: 24px;">
          <label for="name" style="display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 500;">Your Name</label>
          <input type="text" id="name" name="name" required style="width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); color: #fff; font-family: 'Inter', sans-serif;">
        </div>

        <div style="margin-bottom: 24px;">
          <label for="email" style="display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 500;">Email Address</label>
          <input type="email" id="email" name="email" required style="width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); color: #fff; font-family: 'Inter', sans-serif;">
        </div>

        <div style="margin-bottom: 24px;">
          <label for="message" style="display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 500;">Message</label>
          <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); color: #fff; font-family: 'Inter', sans-serif; resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg">Send Message</button>
      </form>
    </div>
  </section>
</div>

<script src="/js/auth.js?v=2"></script>
<script src="/js/cart.js?v=2"></script>
<script>
  $(document).ready(function () {
    window.renderNavbar({ showCart: true, showSearch: true });

    $('#contact-form').on('submit', function(e) {
      e.preventDefault();
      const btn = $(this).find('button[type="submit"]');
      const originalText = btn.text();
      btn.text('Sending...').prop('disabled', true);
      
      // Simulate sending
      setTimeout(() => {
        window.showToast('Your message has been sent. We will get back to you shortly!', 'success');
        $('#contact-form')[0].reset();
        btn.text(originalText).prop('disabled', false);
      }, 1000);
    });
  });
</script>
</body>
</html>
