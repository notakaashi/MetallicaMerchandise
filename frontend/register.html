<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a Metallica Merch Store account and join the pit.">
  <title>Register — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">METALLICA</div>
    <div class="auth-tagline">Join the Metallica Faithful</div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input type="text" id="reg-name" name="name" class="form-control" placeholder="James Hetfield" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" class="form-control" placeholder="your@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" class="form-control" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" name="confirm_password" class="form-control" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" id="register-btn" class="btn btn-accent w-full btn-lg mt-2">
        Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="text-center text-muted" style="font-size:14px;">
      Already have an account?
      <a href="/login.html" class="text-accent" style="font-weight:600">Login here →</a>
    </p>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/js/auth.js"></script>
<script>
  $(document).ready(function () {
    // Redirect if already logged in
    if (window.Auth.isLoggedIn()) { window.location.href = '/index.html'; return; }

    $('#register-form').validate({
      rules: {
        name:             { required: true, minlength: 2 },
        email:            { required: true, email: true },
        password:         { required: true, minlength: 6 },
        confirm_password: { required: true, equalTo: '#reg-password' },
      },
      messages: {
        name:             { required: 'Name is required' },
        email:            { required: 'Email is required', email: 'Enter a valid email' },
        password:         { required: 'Password is required', minlength: 'At least 6 characters' },
        confirm_password: { required: 'Please confirm password', equalTo: 'Passwords do not match' },
      },
      submitHandler: function () {
        const $btn = $('#register-btn');
        $btn.prop('disabled', true).html('<span class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></span>');

        $.ajax({
          url: `${API_BASE}/api/auth/register`,
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ name: $('#reg-name').val().trim(), email: $('#reg-email').val().trim(), password: $('#reg-password').val() }),
          success: function () {
            window.showToast('Account created! Please log in.', 'success');
            setTimeout(() => window.location.href = '/login.html', 1200);
          },
          error: function (xhr) {
            const msg = xhr.responseJSON ? xhr.responseJSON.error : 'Registration failed';
            window.showToast(msg, 'error');
            $btn.prop('disabled', false).html('Create Account');
          },
        });
      },
    });
  });
</script>
</body>
</html>
