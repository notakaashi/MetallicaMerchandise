<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    .category-pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: var(--space-xl);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: var(--space-xl);
    }
    .category-pill {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .category-pill:hover {
      background: var(--bg-hover);
      color: var(--color-white);
    }
    .category-pill.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: var(--color-white);
    }
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
      gap: 16px;
    }
    .sort-dropdown {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--color-white);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    .sort-dropdown:focus {
      border-color: var(--color-silver);
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-4xl) 0;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      border: 1px dashed var(--border-light);
    }
    
    /* Inline Product Modal adjustments */
    .product-detail-modal .modal-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
    }
    @media (max-width: 768px) {
      .product-detail-modal .modal-body { grid-template-columns: 1fr; }
    }
    .modal-gallery img {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      margin-bottom: var(--space-md);
    }
    .qty-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: var(--space-lg);
    }
    .qty-input {
      width: 50px;
      height: 32px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--color-white);
      text-align: center;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="page-wrapper section-padding">
    <div class="container">
      <h2>All Merch</h2>
    
      <div class="category-pills" id="category-pills">
        <div class="category-pill active" data-category="all">All</div>
        <div class="category-pill" data-category="shirts">Shirts</div>
        <div class="category-pill" data-category="hoodies">Hoodies</div>
        <div class="category-pill" data-category="posters">Posters</div>
        <div class="category-pill" data-category="accessories">Accessories</div>
        <div class="category-pill" data-category="vinyl">Vinyl</div>
        <div class="category-pill" data-category="other">Other</div>
      </div>
      
      <div class="filter-bar">
        <div class="text-muted" id="result-count" style="font-size:14px;">Loading products...</div>
        <select class="sort-dropdown" id="sort-dropdown">
          <option value="newest">Newest</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="name_asc">Name: A-Z</option>
          <option value="name_desc">Name: Z-A</option>
        </select>
      </div>
      
      <div class="grid grid-cols-4" id="products-grid">
        <!-- Products loaded via JS -->
      </div>
      
      <div id="pagination">
        <!-- Pagination loaded via JS -->
      </div>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div class="modal-overlay product-detail-modal" id="product-detail-modal">
    <div style="position:absolute;inset:0;cursor:pointer" onclick="$('#product-detail-modal').removeClass('open')"></div>
    <div class="modal" style="position:relative;z-index:1;">
      <div class="modal-header">
        <h2 class="modal-title" id="detail-title">Product Details</h2>
        <button class="modal-close" onclick="$('#product-detail-modal').removeClass('open')">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-gallery" id="detail-gallery"></div>
        <div class="modal-info">
          <h3 id="detail-name" style="margin-bottom:var(--space-sm);"></h3>
          <div id="detail-price" style="font-size:32px;color:var(--color-white);font-weight:300;font-family:var(--font-body);margin-bottom:var(--space-md)"></div>
          <div id="detail-stock-badge" style="margin-bottom:var(--space-lg)"></div>
          <p id="detail-desc" style="color:var(--text-secondary);line-height:1.6;margin-bottom:var(--space-xl)"></p>
          
          <div class="qty-selector">
            <label class="form-label" style="margin:0">Qty</label>
            <div class="cart-qty-control">
              <button class="cart-qty-btn" onclick="let v = parseInt($('#detail-qty').val()); if(v>1) $('#detail-qty').val(v-1);">−</button>
              <input type="number" id="detail-qty" class="cart-qty-value" style="width:40px;background:none;border:none;color:var(--color-white);text-align:center" value="1" min="1">
              <button class="cart-qty-btn" onclick="$('#detail-qty').val(parseInt($('#detail-qty').val())+1)">+</button>
            </div>
          </div>
          
          <button class="btn btn-accent btn-lg w-full mt-2" id="detail-add-btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js?v=7"></script>
  <script src="/js/cart.js?v=7"></script>
  <script src="/js/products.js?v=7"></script>
  <script>
    $(document).ready(function () {
      window.renderNavbar({ showCart: true, showSearch: true });
    });
  </script>
</body>
</html>
