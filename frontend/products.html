<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    /* Products Page Specific Styles */
    .products-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .category-pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 24px;
    }
    .category-pill {
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .category-pill:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .category-pill.active {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: #fff;
    }
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .result-count {
      color: var(--text-secondary);
      font-size: 14px;
    }
    .sort-dropdown {
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    .sort-dropdown:focus {
      border-color: var(--accent-red);
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    @media (max-width: 992px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 576px) {
      .products-grid { grid-template-columns: 1fr; }
    }
    
    .product-card {
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      border-color: var(--accent-red);
      transform: translateY(-4px);
    }
    .product-img-wrap {
      aspect-ratio: 1;
      overflow: hidden;
      background: #121212;
      position: relative;
      cursor: pointer;
    }
    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .product-card:hover .product-img {
      transform: scale(1.05);
    }
    .product-info {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .product-name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text-primary);
      cursor: pointer;
    }
    .product-name:hover {
      color: var(--accent-red);
    }
    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-red);
      font-family: 'Outfit', sans-serif;
      margin-bottom: 12px;
    }
    .product-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stock-badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .stock-badge.in-stock { background: rgba(40, 199, 111, 0.15); color: #28c76f; }
    .stock-badge.out-stock { background: rgba(234, 84, 85, 0.15); color: #ea5455; }
    
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 16px;
      background: #1e1e1e;
      border-radius: var(--radius-md);
      border: 1px dashed rgba(255, 255, 255, 0.1);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 40px;
    }
    .page-btn {
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      min-width: 36px;
      height: 36px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .page-btn.active {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: #fff;
    }
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Inline Product Modal */
    .product-detail-modal .modal-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    @media (max-width: 768px) {
      .product-detail-modal .modal-body { grid-template-columns: 1fr; }
    }
    .modal-gallery img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .qty-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .qty-input {
      width: 50px;
      height: 32px;
      background: #121212;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      text-align: center;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="page-wrapper" style="padding-top:calc(var(--navbar-height) + 40px)">
    <div class="products-container">
      <h1 style="font-family:'Outfit',sans-serif;font-weight:900;font-size:40px;margin-bottom:24px">ALL MERCH</h1>
    
    <div class="category-pills" id="category-pills">
      <div class="category-pill active" data-category="all">All</div>
      <div class="category-pill" data-category="shirts">Shirts</div>
      <div class="category-pill" data-category="hoodies">Hoodies</div>
      <div class="category-pill" data-category="posters">Posters</div>
      <div class="category-pill" data-category="accessories">Accessories</div>
      <div class="category-pill" data-category="vinyl">Vinyl</div>
      <div class="category-pill" data-category="other">Other</div>
    </div>
    
    <div class="filter-bar">
      <div class="result-count" id="result-count">Loading products...</div>
      <select class="sort-dropdown" id="sort-dropdown">
        <option value="newest">Newest</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="name_asc">Name: A-Z</option>
        <option value="name_desc">Name: Z-A</option>
      </select>
    </div>
    
    <div class="products-grid" id="products-grid">
      <!-- Products loaded via JS -->
    </div>
    
      <div class="pagination" id="pagination">
        <!-- Pagination loaded via JS -->
      </div>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div class="modal-overlay product-detail-modal" id="product-detail-modal">
    <div class="modal-overlay-bg" style="position:absolute;inset:0;cursor:pointer" onclick="$('#product-detail-modal').removeClass('open')"></div>
    <div class="modal" style="position:relative;z-index:1;max-width:800px">
      <div class="modal-header">
        <h2 class="modal-title" id="detail-title">Product Details</h2>
        <button class="modal-close" onclick="$('#product-detail-modal').removeClass('open')">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-gallery" id="detail-gallery"></div>
        <div class="modal-info">
          <h3 id="detail-name" style="font-size:24px;font-weight:700;margin-bottom:12px;color:var(--text-primary)"></h3>
          <div id="detail-price" style="font-size:28px;color:var(--accent-red);font-weight:900;font-family:'Outfit',sans-serif;margin-bottom:16px"></div>
          <div id="detail-stock-badge" style="margin-bottom:24px"></div>
          <p id="detail-desc" style="color:var(--text-secondary);line-height:1.6;margin-bottom:32px"></p>
          
          <div class="qty-selector">
            <span style="color:var(--text-primary);font-weight:500">Quantity:</span>
            <button class="qty-btn" onclick="let v = parseInt($('#detail-qty').val()); if(v>1) $('#detail-qty').val(v-1);">-</button>
            <input type="number" id="detail-qty" class="qty-input" value="1" min="1">
            <button class="qty-btn" onclick="$('#detail-qty').val(parseInt($('#detail-qty').val())+1)">+</button>
          </div>
          
          <button class="btn btn-primary btn-lg w-full" id="detail-add-btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js?v=4"></script>
  <script src="/js/cart.js?v=4"></script>
  <script src="/js/products.js?v=4"></script>
  <script>
    $(document).ready(function () {
      window.renderNavbar({ showCart: true, showSearch: true });
    });
  </script>
</body>
</html>
