<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Complete your Metallica Merch Store order.">
  <title>Checkout — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
</head>
<body>

<!-- Navbar injected by auth.js -->

<div class="page-wrapper section-padding">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-header-title">Checkout</h1>
        <p class="text-muted mt-1">Complete your order — horns up!</p>
      </div>
      <a href="/index.html" class="btn btn-secondary">← Continue Shopping</a>
    </div>

    <div class="checkout-layout">
      <!-- Form -->
      <div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              Shipping Information
            </div>
          </div>
          <div class="card-body">
            <form id="checkout-form" novalidate>
              <div class="grid grid-cols-2" style="gap:var(--space-md)">
                <div class="form-group" style="grid-column:1/-1">
                  <label class="form-label" for="checkout-name">Full Name</label>
                  <input type="text" id="checkout-name" name="full_name" class="form-control" placeholder="James Hetfield" required>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                  <label class="form-label" for="checkout-email">Email</label>
                  <input type="email" id="checkout-email" name="email" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                  <label class="form-label" for="checkout-phone">Phone Number</label>
                  <input type="tel" id="checkout-phone" name="phone" class="form-control" placeholder="+1 234 567 8900" required>
                </div>
                <div class="form-group" style="grid-column:1/-1">
                  <label class="form-label" for="checkout-address">Street Address</label>
                  <input type="text" id="checkout-address" name="address" class="form-control" placeholder="123 Blackened Way" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="checkout-city">City</label>
                  <input type="text" id="checkout-city" name="city" class="form-control" placeholder="San Francisco" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="checkout-zip">ZIP Code</label>
                  <input type="text" id="checkout-zip" name="zip" class="form-control" placeholder="94102" required>
                </div>
              </div>

              <div class="card mt-2 mb-2">
                <div class="card-header">
                  <div class="card-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
                    </svg>
                    Payment Method
                  </div>
                </div>
                <div class="card-body">
                  <div class="form-group mb-4" style="display:flex; gap:20px; align-items:center;">
                    <label style="cursor:pointer; display:flex; align-items:center; gap:8px;">
                      <input type="radio" name="payment_method" value="card" checked>
                      Credit Card
                    </label>
                    <label style="cursor:pointer; display:flex; align-items:center; gap:8px;">
                      <input type="radio" name="payment_method" value="cash">
                      Cash on Delivery
                    </label>
                  </div>
                  
                  <div id="card-details-section">
                    <div class="grid grid-cols-2" style="gap:var(--space-md)">
                      <div class="form-group" style="grid-column:1/-1">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" value="4242 4242 4242 4242" readonly style="opacity:0.6;cursor:not-allowed">
                      </div>
                      <div class="form-group">
                        <label class="form-label">Expiry</label>
                        <input type="text" class="form-control" value="12/28" readonly style="opacity:0.6;cursor:not-allowed">
                      </div>
                      <div class="form-group">
                        <label class="form-label">CVV</label>
                        <input type="text" class="form-control" value="•••" readonly style="opacity:0.6;cursor:not-allowed">
                      </div>
                    </div>
                    <p class="text-muted mt-1" style="font-size:12px;">This is a demo store. No real payment is processed.</p>
                  </div>
                  <div id="cash-details-section" style="display:none;">
                    <p class="text-muted" style="font-size:14px;">You will pay in cash upon delivery of your items.</p>
                  </div>
                </div>
              </div>
              
              <script>
                document.querySelectorAll('input[name="payment_method"]').forEach(radio => {
                  radio.addEventListener('change', function() {
                    if (this.value === 'cash') {
                      document.getElementById('card-details-section').style.display = 'none';
                      document.getElementById('cash-details-section').style.display = 'block';
                    } else {
                      document.getElementById('card-details-section').style.display = 'block';
                      document.getElementById('cash-details-section').style.display = 'none';
                    }
                  });
                });
              </script>

              <button type="submit" id="checkout-submit-btn" class="btn btn-accent w-full btn-lg">Place Order</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div>
        <div class="checkout-summary">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:var(--space-md);display:flex;align-items:center;gap:8px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            Order Summary
          </h3>
          <div id="checkout-items">
            <div class="text-center section-padding"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script>
  $(document).ready(function () {
    // Auth guard
    if (!window.Auth.requireAuth('/login?redirect=/checkout')) return;
    window.renderNavbar({ showCart: false, showSearch: false });
  });
</script>
</body>
</html>
