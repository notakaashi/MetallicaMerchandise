<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View your Metallica Merch Store order history.">
  <title>My Orders — Metallica Merch Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<!-- Navbar injected by auth.js -->

<div class="page-wrapper section-padding">
  <div class="container" style="max-width:860px">
    <div class="page-header">
      <div>
        <h1 class="page-header-title">My Orders</h1>
        <p class="text-muted mt-1">Your Metallica merch order history</p>
      </div>
      <a href="/index.html" class="btn btn-accent">Shop More</a>
    </div>

    <div id="orders-container">
      <div class="text-center section-padding">
        <div class="spinner"></div>
        <p class="text-muted mt-2">Loading your orders...</p>
      </div>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script>
  $(document).ready(function () {
    // Auth guard
    if (!window.Auth.requireAuth('/login?redirect=/orders')) return;
    window.renderNavbar({ showCart: true, showSearch: false });
  });
</script>
</body>
</html>
